[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/kma"
  to = "/.netlify/functions/kma"
  status = 200

# Vue SPA 라우팅
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
